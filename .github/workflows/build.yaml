name: build
on:
  push:
    branches:
      - m
  pull_request:
    branches:
      - m
jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: 'actions/checkout@v4'
        with:
          fetch-depth: '0'

      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install packages
        run: npm ci

      - name: compile packages
        run: npm run cb:all
